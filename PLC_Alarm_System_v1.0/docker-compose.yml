version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: alarm_user
      POSTGRES_PASSWORD: alarm_pass
      POSTGRES_DB: alarm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - alarm_net

  backend:
    build: ./backend
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://alarm_user:alarm_pass@postgres:5432/alarm_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - alarm_net

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - alarm_net

volumes:
  postgres_data:

networks:
  alarm_net:
